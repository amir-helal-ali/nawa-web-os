[book]
title = "NAWA · نواة Documentation"
authors = ["NAWA Project"]
description = "Revolutionary Web Operating System built in Rust"
language = "en"
src = "src"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/amir-helal-ali/nawa-web-os"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/amir-helal-ali/nawa-web-os/edit/main/nawa-rs/docs/src/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
