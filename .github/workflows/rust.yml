name: CI

on:
  push:
    branches: [main]
    paths:
      - "nawa-rs/**"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "nawa-rs/**"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, 1.83]
    defaults:
      run:
        working-directory: nawa-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-registry-${{ hashFiles('nawa-rs/**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: nawa-rs/target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-build-${{ hashFiles('nawa-rs/**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run benchmark (smoke)
        run: ./target/release/nawad benchmark --ops 1000 || true

  build-docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build NAWA Docker image
        uses: docker/build-push-action@v5
        with:
          context: nawa-rs
          push: false
          tags: nawa/os:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run -d --name nawa-test -p 8080:8080 nawa/os:latest
          sleep 2
          curl -s http://localhost:8080/health | grep -q "ok"
          docker stop nawa-test

  release:
    name: Release binary
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        working-directory: nawa-rs
        run: cargo build --release --bin nawad

      - name: Strip binary
        run: strip nawa-rs/target/release/nawad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nawad-linux-amd64
          path: nawa-rs/target/release/nawad
          retention-days: 30
